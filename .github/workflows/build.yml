name: Build il2cpp-modern

on:
  push:
    branches:
      - il2cpp-modern
  pull_request:
    branches:
      - il2cpp-modern
  workflow_dispatch:

jobs:
  build:
    name: Build UUVR
    runs-on: windows-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Automatically checks out the branch that triggered the workflow
          submodules: recursive 

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x' 

      # Fix for NU1101: Tell .NET where to find BepInEx packages
      - name: Add BepInEx NuGet Source
        run: dotnet nuget add source https://nuget.bepinex.dev/v3/index.json -n BepInEx

      - name: Restore NuGet Packages
        run: dotnet restore UnityUniversalVr.sln

      - name: Build Solution (Release)
        run: dotnet build UnityUniversalVr.sln --configuration Release --no-restore

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uuvr-il2cpp-modern-build
          path: |
            **/bin/Release/**
            !**/obj/**
          if-no-files-found: warn
