name: Build

on:
  push:
    branches: [il2cpp-modern]
  pull_request:
    branches: [il2cpp-modern]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout il2cpp-modern branch
        uses: actions/checkout@v4
        with:
          ref: il2cpp-modern

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download BepInEx 6 bleeding-edge (IL2CPP, win-x64)
        shell: pwsh
        run: |
          $response = Invoke-RestMethod "https://builds.bepinex.dev/projects/bepinex_be"
          # Grab the latest build number from the page
          $latestZip = ($response -split "`n" | Select-String "BepInEx-Unity.IL2CPP-win-x64.*\.zip" | Select-Object -First 1).ToString().Trim()
          $url = "https://builds.bepinex.dev/projects/bepinex_be/$latestZip"
          Write-Host "Downloading: $url"
          Invoke-WebRequest $url -OutFile bepinex.zip

      - name: Extract BepInEx
        shell: pwsh
        run: |
          Expand-Archive bepinex.zip -DestinationPath ${{ github.workspace }}\bepinex_dist

      - name: Build (modern-il2cpp)
        shell: pwsh
        run: |
          dotnet build UnityUniversalVr.sln `
            --configuration modern-il2cpp `
            /p:BepInExDir=${{ github.workspace }}\bepinex_dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uuvr-il2cpp-modern
          path: |
            **/bin/modern-il2cpp/**
          if-no-files-found: error
